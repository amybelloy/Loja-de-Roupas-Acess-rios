<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | ÉLÉGANCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <main class="container section-padding">
        <div class="breadcrumb" style="font-size: 11px; color: #999; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.05em;">
            Home / Contato
        </div>

        <h1 style="font-size: 2.8rem; font-family: var(--font-heading); margin-bottom: 60px; text-align: center;">Fale com a ÉLÉGANCE</h1>

        <div class="grid grid-2" style="gap: 100px;">
            <!-- Contact Info -->
            <div style="padding-top: 20px;">
                <div style="margin-bottom: 50px;">
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 25px;">Onde estamos</h3>
                    <p style="color: #666; font-size: 0.95rem; line-height: 1.8; margin-bottom: 10px;">Avenida Oscar Freire, 1000 - Jardins</p>
                    <p style="color: #666; font-size: 0.95rem; line-height: 1.8;">São Paulo, Brasil</p>
                </div>

                <div style="margin-bottom: 50px;">
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 25px;">Atendimento</h3>
                    <p style="color: #666; font-size: 0.95rem; margin-bottom: 10px;">atendimento@elegance.com.br</p>
                    <p style="color: #666; font-size: 0.95rem; margin-bottom: 15px;">+55 (11) 4002-8922</p>
                    <p style="color: #666; font-size: 0.85rem; font-style: italic;">Segunda a Sexta, das 09h às 18h</p>
                </div>

                <div>
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 25px;">Redes Sociais</h3>
                    <div class="flex" style="gap: 25px; font-size: 1.2rem;">
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-pinterest"></i></a>
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div style="background: #fafafa; padding: 60px; border: 1px solid #eee;">
                <h3 style="font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 30px;">Envie uma Mensagem</h3>
                <form id="contactForm">
                    <div style="margin-bottom: 20px;">
                        <label style="font-size: 11px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 8px;">Nome Completo</label>
                        <input type="text" style="width: 100%; padding: 15px; border: 1px solid #ddd; outline: none; font-size: 14px; background: #fff;" required>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="font-size: 11px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 8px;">E-mail Corporativo</label>
                        <input type="email" style="width: 100%; padding: 15px; border: 1px solid #ddd; outline: none; font-size: 14px; background: #fff;" required>
                    </div>
                    <div style="margin-bottom: 30px;">
                        <label style="font-size: 11px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 8px;">Sua Mensagem</label>
                        <textarea style="width: 100%; padding: 15px; border: 1px solid #ddd; outline: none; font-size: 14px; height: 150px; font-family: var(--font-primary); background: #fff;"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; background: #111; color: #fff; padding: 18px; font-weight: 700; font-size: 12px; letter-spacing: 0.15rem;">ENVIAR MENSAGEM</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { renderHeader, renderFooter, updateBadges } from './js/components.js';
        renderHeader();
        renderFooter();
        updateBadges();

        document.getElementById('contactForm').onsubmit = (e) => {
            e.preventDefault();
            alert('Mensagem enviada com sucesso! Nossa equipe entrará em contato em breve.');
            e.target.reset();
        };
    </script>
</body>
</html>
